<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>The競馬 EV分析 v5.16.2 JRA RaceName Fix</title>
<style>
:root{--bg:#07111d;--panel:#142033;--card:#1f2c44;--line:#31415f;--text:#e6eef8;--muted:#91a4bc;--green:#00e676;--green2:#00ffa3;--red:#ff6b7a;--yellow:#ffd166;--blue:#60a5fa;--shadow:0 0 18px rgba(0,230,118,.35),0 18px 50px rgba(0,0,0,.25)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -12%,rgba(0,230,118,.18),transparent 32%),linear-gradient(180deg,#07111d,#0b1324 54%,#050914);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}.header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(8,18,30,.96);border-bottom:1px solid rgba(0,230,118,.18);backdrop-filter:blur(12px)}h1{font-size:16px;margin:0;display:flex;align-items:center;gap:9px}.logo{width:30px;height:30px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#caffdf,#00e676 55%,#008944);color:#02140b;box-shadow:var(--shadow);font-size:21px;font-weight:900}.ver{font-size:11px;color:var(--muted)}.main{max-width:760px;margin:0 auto;padding:12px}.tabs{display:flex;gap:6px;overflow-x:auto;margin:0 0 12px}.tab{white-space:nowrap;border:1px solid var(--line);background:#17243a;color:var(--muted);border-radius:10px;padding:9px 13px;font-weight:800}.tab.active{background:linear-gradient(135deg,#00b35f,#00e676);color:#02140b;border-color:#00e676;box-shadow:var(--shadow)}.card{background:linear-gradient(180deg,rgba(31,44,68,.95),rgba(20,32,51,.95));border:1px solid rgba(148,163,184,.22);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 16px 40px rgba(0,0,0,.18)}h2{font-size:13px;color:var(--muted);letter-spacing:.05em;margin:0 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:10px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}input,select,textarea{width:100%;background:#111b2d;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:10px;font:inherit}select option{background:#111b2d}.row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.btn{border:0;border-radius:11px;padding:11px 14px;font-weight:900;font:inherit;cursor:pointer}.btn.green{background:linear-gradient(135deg,#00b35f,#00e676);color:#02140b;box-shadow:var(--shadow)}.btn.sub{background:#152238;color:var(--text);border:1px solid var(--line)}.btn.red{background:rgba(255,107,122,.15);color:#ffc2c8;border:1px solid rgba(255,107,122,.28)}.status{font-size:12px;border-radius:10px;padding:8px 10px;margin:8px 0;background:rgba(96,165,250,.10);border:1px solid rgba(96,165,250,.20);color:#cfe4ff}.status.ok{background:rgba(0,230,118,.10);border-color:rgba(0,230,118,.24);color:#baffd7}.status.err{background:rgba(255,107,122,.11);border-color:rgba(255,107,122,.26);color:#ffc2c8}.race-title{display:none;margin-top:8px;padding:8px 10px;border-radius:10px;background:rgba(0,230,118,.09);border:1px solid rgba(0,230,118,.22);color:#a7f3d0;font-size:12px}.horse-head,.horse{display:grid;grid-template-columns:52px 1fr 76px 58px 32px;gap:7px;align-items:center}.horse-head{font-size:10px;color:var(--muted);margin-bottom:6px}.horse{margin-bottom:6px}.horse input{text-align:left;padding:8px}.horse .num,.horse .odds,.horse .pop{text-align:center}.x{height:34px;border-radius:9px;background:#152238;color:#9fb0c8;border:1px solid var(--line)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.kpi{background:#111b2d;border:1px solid rgba(148,163,184,.16);border-radius:13px;text-align:center;padding:12px 6px}.kpi b{font-size:18px}.kpi span{display:block;color:var(--muted);font-size:10px;margin-top:3px}table{width:100%;border-collapse:collapse;font-size:12px}th{color:var(--muted);text-align:left;background:#111b2d;padding:7px}td{padding:8px 7px;border-bottom:1px solid rgba(148,163,184,.12)}.chip{display:inline-block;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:900;border:1px solid rgba(0,230,118,.28);color:#a7f3d0;background:rgba(0,230,118,.09)}.good{color:#86efac;font-weight:900}.bad{color:#fca5a5}.warn{color:#fde68a}.simhero{overflow:hidden;position:relative;border-radius:18px;padding:16px;background:radial-gradient(circle at 15% 0%,rgba(0,230,118,.25),transparent 36%),linear-gradient(135deg,#02140b,#12243a);border:1px solid rgba(0,230,118,.35);box-shadow:var(--shadow)}.simtitle{display:flex;align-items:center;gap:12px;font-size:18px;font-weight:950}.simlogo{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#caffdf,#00e676 55%,#007f43);color:#02140b;font-size:32px;box-shadow:var(--shadow)}.ticket{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:rgba(15,23,42,.48);border:1px solid rgba(148,163,184,.18);border-radius:14px;padding:12px;margin-bottom:8px}.ticket.hit{border-color:rgba(0,230,118,.38);background:rgba(0,230,118,.10)}.ticket.miss{border-color:rgba(255,107,122,.24);background:rgba(255,107,122,.06)}.small{font-size:11px;color:var(--muted);line-height:1.6}.hide{display:none}.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:#00e676;border-radius:50%;animation:spin .65s linear infinite;vertical-align:-2px;margin-right:6px}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:620px){.grid{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.horse-head,.horse{grid-template-columns:44px 1fr 66px 50px 30px}.main{padding:10px}}
</style>
</head>
<body>
<div class="header"><h1><span class="logo">♞</span>The競馬 EV分析</h1><span class="ver">v5.16.2 JRA修正版</span></div>
<div class="main">
  <div class="tabs"><button class="tab active" data-tab="horses">🐎 馬データ</button><button class="tab" data-tab="result">📊 推奨買い目</button><button class="tab" data-tab="sim">♞ シミュレーション</button><button class="tab" data-tab="proxy">🌐 プロキシ</button></div>
  <section id="tab-horses">
    <div class="card"><h2>🌐 NETKEIBAから自動取得</h2>
      <div class="grid"><div class="field"><label>日付</label><input type="date" id="pickDate"></div><div class="field"><label>区分</label><select id="pickKind"><option value="JRA">JRA</option><option value="NAR">NAR</option></select></div></div>
      <div class="grid"><div class="field"><label>開催場</label><select id="pickVenue"></select></div><div class="field"><label>操作</label><button class="btn sub" style="width:100%" onclick="loadRaceList()">📅 レース一覧</button></div></div>
      <div class="field"><label>レース選択</label><div class="row"><select id="raceSelect" onchange="applySelectedRaceUrl()"><option value="">先にレース一覧を取得</option></select><button class="btn sub" onclick="applySelectedRaceUrl()">URL反映</button></div><div id="raceTitleBox" class="race-title"></div></div>
      <div class="field"><label>レースURL</label><input id="raceUrl" type="url" placeholder="https://race.netkeiba.com/race/shutuba.html?race_id=..."></div>
      <div id="urlStatus"></div><button class="btn green" style="width:100%" onclick="fetchRace()">🔄 レースデータ取得</button>
    </div>
    <div class="card"><div class="row" style="margin-bottom:10px"><h2 style="flex:1;margin:0">🐎 出走馬データ</h2><button class="btn sub" onclick="addHorseRow()">＋追加</button><button class="btn red" onclick="clearHorses()">クリア</button></div><div class="horse-head"><span>馬番</span><span>馬名</span><span>単勝</span><span>人気</span><span></span></div><div id="horseRows"></div><button class="btn green" style="width:100%;margin-top:8px" onclick="runPredict()">📐 EV計算・買い目推奨</button></div>
  </section>
  <section id="tab-result" class="hide"><div class="card"><h2>📊 レース概要</h2><div class="summary" id="summaryGrid"></div></div><div class="card"><h2>🎯 推奨買い目</h2><div id="ticketList" class="small">まだ計算されていません。</div></div><div class="card"><h2>📋 全候補</h2><div style="overflow-x:auto"><table><thead><tr><th>券種</th><th>組合せ</th><th>確率</th><th>オッズ</th><th>EV</th><th>Kelly</th></tr></thead><tbody id="candBody"></tbody></table></div></div></section>
  <section id="tab-sim" class="hide"><div class="simhero"><div class="simtitle"><span class="simlogo">♞</span><div>GREEN EDGE SIMULATOR<div class="small">PRODUCT MODE</div></div></div><div class="field" style="margin-top:12px"><label>結果URL</label><input id="simResultUrl" type="url" placeholder="https://race.netkeiba.com/race/result.html?race_id=..."></div><div class="grid"><button class="btn sub" onclick="fillSimResultUrl()">🔗 結果URL自動入力</button><button class="btn green" onclick="runSimulationFromResult()">⚡ 結果取得・本精算</button></div><div id="simStatus"></div></div><div class="card"><h2>✍️ 手入力シミュレーション</h2><div class="grid"><div class="field"><label>着順 馬番 例 5-2-8</label><input id="manualFinishNums"></div><div class="field"><label>着順 枠番 例 3-1-5</label><input id="manualFinishFrames"></div></div><button class="btn green" style="width:100%" onclick="runManualSimulation()">♞ 仮精算</button></div><div class="card"><h2>📊 シミュレーション結果</h2><div id="simSummary" class="small">未実行です。</div></div><div class="card"><h2>🧾 買い目別結果</h2><div id="simTicketList" class="small">推奨買い目作成後に実行できます。</div></div></section>
  <section id="tab-proxy" class="hide"><div class="card"><h2>🌐 Cloudflare Workers プロキシ</h2><div class="field"><label>Workers URL</label><input id="proxyUrl" type="url"></div><div id="proxyStatus" class="small"></div><button class="btn green" onclick="testProxy()">🔗 接続テスト</button><div class="small" style="margin-top:12px">初期値は指定済みです。文字化け対策として UTF-8 解釈を優先します。</div><textarea readonly style="height:220px;margin-top:8px;font-family:Menlo,monospace;font-size:11px">export default { async fetch(request) { const url = new URL(request.url); const target = url.searchParams.get('url'); if (!target) return new Response('missing url',{status:400}); const res = await fetch(target,{headers:{'User-Agent':'Mozilla/5.0'}}); const body = await res.arrayBuffer(); return new Response(body,{headers:{'content-type':res.headers.get('content-type')||'text/html; charset=UTF-8','access-control-allow-origin':'*'}}); } }</textarea></div></section>
</div>
<script>
'use strict';
const DEFAULT_PROXY='https://takuya.nitta-katsuhiko.workers.dev/';
const JRA_VENUES={ '01':'札幌','02':'函館','03':'福島','04':'新潟','05':'東京','06':'中山','07':'中京','08':'京都','09':'阪神','10':'小倉' };
const NAR_VENUES={ '30':'帯広(ば)','31':'門別','32':'旭川','33':'水沢','34':'上山','35':'盛岡','36':'川崎','37':'浦和','38':'船橋','39':'宇都宮','40':'高崎','41':'三条','42':'笠松','43':'名古屋','44':'大井','45':'金沢','46':'福山','47':'高知','48':'佐賀','49':'荒尾','50':'中津','51':'札幌(地)','52':'函館(地)','53':'新潟(地)','54':'中京(地)','55':'園田','56':'姫路' };
const state={horses:[],tickets:[],candidates:[],race:null,settings:{proxyUrl:localStorage.tk_proxy||DEFAULT_PROXY,budget:500,unit:100,maxTickets:6,nar:false}};
let currentRaceId='',currentRaceName='';
const $=id=>document.getElementById(id); const yen=n=>(Math.round(Number(n)||0)).toLocaleString('ja-JP')+'円';
function norm(s){return String(s||'').replace(/\u00a0/g,' ').replace(/[\t\r\n]+/g,' ').replace(/\s+/g,' ').trim()}
function todayYmd(){const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function compact(ymd){return String(ymd||'').replace(/-/g,'')}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function raceIdFromUrl(u){return (String(u||'').match(/race_id=(\d{10,14})/)||[])[1]||''}
function kindFromRaceId(id){return String(id).slice(4,6)>='30'?'NAR':'JRA'}
function venueName(kind,code){return (kind==='NAR'?NAR_VENUES:JRA_VENUES)[code]||code}
function shutubaUrl(kind,id){return kind==='NAR'?`https://nar.netkeiba.com/race/shutuba.html?race_id=${id}&rf=race_submenu`:`https://race.netkeiba.com/race/shutuba.html?race_id=${id}&rf=race_submenu`}
function resultUrl(kind,id){return kind==='NAR'?`https://nar.netkeiba.com/race/result.html?race_id=${id}&rf=race_submenu`:`https://race.netkeiba.com/race/result.html?race_id=${id}&rf=race_submenu`}
function proxyUrl(url){const p=state.settings.proxyUrl||DEFAULT_PROXY; return p.replace(/\/?$/,'')+'/?url='+encodeURIComponent(url)}
async function getText(url){const res=await fetch(proxyUrl(url),{cache:'no-store'}); if(!res.ok) throw new Error('HTTP '+res.status); const ab=await res.arrayBuffer(); let text=new TextDecoder('utf-8').decode(ab); if(/�/.test(text.slice(0,2000))) try{text=new TextDecoder('shift_jis').decode(ab)}catch(e){} return text}
function setStatus(html,cls=''){ $('urlStatus').innerHTML=`<div class="status ${cls}">${html}</div>` }
function cleanRaceName(raw,raceNo){let s=norm(raw); s=s.replace(/^[\s\S]*?(\d{1,2})R\s*/,''); s=s.replace(/発走\s*\d{1,2}:\d{2}[\s\S]*$/,''); s=s.replace(/(芝|ダート|ダ|障)\s*\d{3,4}m[\s\S]*$/,''); s=s.replace(/出馬表|オッズ|予想|結果|払戻|映像|掲示板|俺プロ|AI|netkeiba/gi,' '); s=norm(s); if(!s||/^\d{1,2}R$/.test(s)||/俺プロ|予想|AI|払戻|オッズ|netkeiba/i.test(s)) return `${raceNo}R`; if(s.length>38) s=s.slice(0,38); return s}
function parseJraKaisai(html,venueCode){const text=norm(html); const venue=JRA_VENUES[venueCode]||''; const pats=[new RegExp(`(\\d{1,2})回\\s*${venue}\\s*(\\d{1,2})日`),new RegExp(`${venue}[^0-9０-９]{0,12}(\\d{1,2})回[^0-9０-９]{0,12}(\\d{1,2})日`)]; for(const re of pats){const m=text.match(re); if(m){const kai=+m[1],day=+m[2]; if(kai>=1&&kai<=12&&day>=1&&day<=12)return{kai,day}}} return null}
function extractJraNames(html,venueCode){const doc=new DOMParser().parseFromString(html,'text/html'); const map=new Map(); doc.querySelectorAll('a[href*="race_id="]').forEach(a=>{const id=raceIdFromUrl(a.getAttribute('href')||a.href); if(!id||id.slice(4,6)!==venueCode)return; const no=+id.slice(-2); if(no<1||no>12)return; const block=a.closest('li,tr,dd,dl,.RaceList_DataItem,.RaceList_Item,.RaceList_Box,[class*="RaceList"]')||a; const t=norm(block.textContent||a.textContent); if(/俺プロ|AI予想|予想大会|マイページ|お気に入り/.test(t))return; const name=cleanRaceName(t,no); if(name!==`${no}R`&&!map.has(no))map.set(no,name)}); return map}
function jraTopUrl(date,venueCode){return `https://race.netkeiba.com/top/race_list.html?kaisai_date=${compact(date)}&jyo=${venueCode}`}
function narListUrl(date,venueCode){return `https://nar.netkeiba.com/top/race_list.html?kaisai_date=${compact(date)}&jyo_cd=${venueCode}`}
function parseNarRaces(html,venueCode){const doc=new DOMParser().parseFromString(html,'text/html'); const out=[],seen=new Set(); doc.querySelectorAll('a[href*="race_id="]').forEach(a=>{const id=raceIdFromUrl(a.getAttribute('href')||a.href); if(!id||id.slice(4,6)!==venueCode||seen.has(id))return; const no=+id.slice(-2); if(no<1||no>12)return; const block=a.closest('li,tr,dd,dl,.RaceList_DataItem,.RaceList_Item,.RaceList_Box,[class*="RaceList"]')||a; let name=cleanRaceName(block.textContent||a.textContent,no); if(name===`${no}R`){const tt=norm(a.textContent); if(tt&&!/出馬表|オッズ|結果|予想|俺プロ/.test(tt)) name=cleanRaceName(tt,no)} seen.add(id); out.push({raceId:id,raceNo:no,raceName:name,shutuba:shutubaUrl('NAR',id)})}); return out.sort((a,b)=>a.raceNo-b.raceNo)}
function buildJraRaces(html,date,venueCode){const kd=parseJraKaisai(html,venueCode); if(!kd)return[]; const names=extractJraNames(html,venueCode); const y=compact(date).slice(0,4); const out=[]; for(let r=1;r<=12;r++){const id=`${y}${venueCode}${String(kd.kai).padStart(2,'0')}${String(kd.day).padStart(2,'0')}${String(r).padStart(2,'0')}`; out.push({raceId:id,raceNo:r,raceName:names.get(r)||`${r}R`,shutuba:shutubaUrl('JRA',id),builtFromKaisai:true})} return out}
async function raceExists(url){try{const t=await getText(url); return /RaceName|出馬表|馬名|単勝|人気|枠/.test(t)&&!/お探しのページ|存在しません/.test(t)}catch(e){return false}}
async function loadRaceList(){const date=$('pickDate').value||todayYmd(),kind=$('pickKind').value,venueCode=$('pickVenue').value; if(!venueCode)return alert('開催場を選択してください'); $('raceSelect').innerHTML='<option>取得中...</option>'; setStatus('<span class="spinner"></span>レース一覧取得中...'); try{let races=[]; if(kind==='JRA'){const html=await getText(jraTopUrl(date,venueCode)); races=buildJraRaces(html,date,venueCode); if(!races.length)throw new Error('JRA開催回次を取得できません'); setStatus(`✅ ${date} ${venueName(kind,venueCode)} ${races.length}レースを取得しました（JRA名汚染ガードON）`,'ok')}else{const html=await getText(narListUrl(date,venueCode)); races=parseNarRaces(html,venueCode); if(!races.length){const y=compact(date).slice(0,4); const checks=[]; for(let r=1;r<=12;r++){for(let k=1;k<=99;k++){const id=`${y}${venueCode}${String(k).padStart(2,'0')}${String(r).padStart(2,'0')}`; checks.push(id)}} const found=[]; for(const id of checks){if(found.some(x=>x.raceNo===+id.slice(-2)))continue; if(await raceExists(shutubaUrl('NAR',id)))found.push({raceId:id,raceNo:+id.slice(-2),raceName:`${+id.slice(-2)}R`,shutuba:shutubaUrl('NAR',id)})} races=found.sort((a,b)=>a.raceNo-b.raceNo)} setStatus(`✅ ${date} ${venueName(kind,venueCode)} ${races.length}レースを取得しました`,'ok')} renderRaceSelect(races,kind)}catch(e){$('raceSelect').innerHTML='<option value="">取得失敗</option>'; setStatus('❌ '+esc(e.message),'err')}}
function renderRaceSelect(races,kind){const sel=$('raceSelect'); sel.innerHTML=''; races.forEach(r=>{const opt=document.createElement('option'); opt.value=r.shutuba; opt.dataset.raceId=r.raceId; opt.dataset.name=r.raceName; opt.textContent=`${r.raceNo}R ${r.raceName} / ${r.raceId}`; sel.appendChild(opt)}); if(races[0]){sel.selectedIndex=0; applySelectedRaceUrl()}}
function applySelectedRaceUrl(){const opt=$('raceSelect').selectedOptions[0]; if(!opt)return; $('raceUrl').value=opt.value||''; currentRaceId=opt.dataset.raceId||raceIdFromUrl(opt.value); currentRaceName=opt.dataset.name||''; const b=$('raceTitleBox'); b.style.display='block'; b.textContent=`選択中: ${currentRaceName||currentRaceId}`}
function populateVenues(){const kind=$('pickKind').value; const map=kind==='NAR'?NAR_VENUES:JRA_VENUES; $('pickVenue').innerHTML=Object.entries(map).map(([c,n])=>`<option value="${c}">${esc(n)}（12R）</option>`).join('')}
function addHorseRow(h={}){state.horses.push({num:h.num||'',name:h.name||'',odds:h.odds||'',pop:h.pop||'',frame:h.frame||''}); renderHorses()}
function clearHorses(){state.horses=[]; renderHorses()}
function renderHorses(){const box=$('horseRows'); box.innerHTML=''; state.horses.forEach((h,i)=>{const d=document.createElement('div'); d.className='horse'; d.innerHTML=`<input class="num" inputmode="numeric" value="${esc(h.num)}" oninput="state.horses[${i}].num=this.value"><input value="${esc(h.name)}" oninput="state.horses[${i}].name=this.value"><input class="odds" inputmode="decimal" value="${esc(h.odds)}" oninput="state.horses[${i}].odds=this.value"><input class="pop" inputmode="numeric" value="${esc(h.pop)}" oninput="state.horses[${i}].pop=this.value"><button class="x" onclick="state.horses.splice(${i},1);renderHorses()">×</button>`; box.appendChild(d)})}
function parseHorses(html){const doc=new DOMParser().parseFromString(html,'text/html'); const rows=[...doc.querySelectorAll('tr')], out=[]; for(const tr of rows){if(!tr.querySelector('a[href*="/horse/"]'))continue; const cells=[...tr.querySelectorAll('td,th')].map(td=>norm(td.textContent)); const raw=norm(tr.textContent); let num=null,name=''; const numEl=tr.querySelector('.Umaban,.HorseNum,.Num,Waku,td'); const m=raw.match(/^\s*(\d{1,2})\s+/); if(m)num=+m[1]; const a=tr.querySelector('a[href*="/horse/"]'); if(a)name=norm(a.textContent); if(!(num>=1&&num<=18)||!name)continue; let odds='',pop=''; const om=raw.match(/(\d{1,3}\.\d)\s*(?:\d+人気)?/); if(om)odds=om[1]; const pm=raw.match(/(\d+)\s*人気/); if(pm)pop=pm[1]; out.push({num,name,odds,pop,frame:Math.ceil(num/2)})} const seen=new Set(); return out.filter(h=>!seen.has(h.num)&&seen.add(h.num)).sort((a,b)=>a.num-b.num)}
function parseRaceNameFromShutuba(html,raceNo){const doc=new DOMParser().parseFromString(html,'text/html'); const sels=['.RaceName','h1','.RaceList_ItemTitle']; for(const s of sels){const t=norm(doc.querySelector(s)?.textContent); const n=cleanRaceName(t,raceNo||''); if(t&&n!==`${raceNo}R`)return n} return currentRaceName||`${raceNo||''}R`}
async function fetchRace(){const url=$('raceUrl').value.trim(); const id=raceIdFromUrl(url); if(!id)return setStatus('❌ race_id入りURLを入力してください','err'); setStatus('<span class="spinner"></span>出走馬データ取得中...'); try{const html=await getText(url); const horses=parseHorses(html); if(!horses.length)throw new Error('出走馬を取得できません。出馬表ページURLか確認してください。'); currentRaceId=id; currentRaceName=parseRaceNameFromShutuba(html,+id.slice(-2)); state.horses=horses; state.race={raceId:id,kind:kindFromRaceId(id),name:currentRaceName,url}; renderHorses(); setStatus(`✅ ${esc(currentRaceName)} / 出走馬${horses.length}頭を取得しました`,'ok')}catch(e){setStatus('❌ '+esc(e.message),'err')}}
function implied(o){o=+o||999; return Math.max(.01,Math.min(.62,1/o*.78))}
function typeOdds(type,nums){const hs=nums.map(n=>state.horses.find(h=>+h.num===+n)).filter(Boolean); const avg=hs.reduce((s,h)=>s+(+h.odds||10),0)/(hs.length||1); const mult={単勝:1,複勝:.42,ワイド:.95,馬連:1.7,馬単:2.9,枠連:1.45,'3連複':5.2,'3連単':14}[type]||1; return Math.max(1.1,+(avg*mult).toFixed(1))}
function runPredict(){const hs=state.horses.map(h=>({...h,num:+h.num,odds:+h.odds||20,pop:+h.pop||99,score:0})).filter(h=>h.num>=1&&h.num<=18&&h.name); if(hs.length<2)return alert('出走馬が足りません'); hs.forEach(h=>{h.winP=implied(h.odds)*(1+(Math.max(0,8-h.pop)*.025)); h.placeP=Math.min(.72,h.winP*2.35); h.score=h.placeP*100-(h.pop*.8)}); hs.sort((a,b)=>b.score-a.score); const cand=[]; const top=hs.slice(0,6); top.forEach(h=>cand.push(makeCand('単勝',[h.num],h.winP,typeOdds('単勝',[h.num])))); top.slice(0,5).forEach(h=>cand.push(makeCand('複勝',[h.num],h.placeP,typeOdds('複勝',[h.num])))); for(let i=0;i<top.length;i++)for(let j=i+1;j<top.length;j++){const p=Math.min(.55,top[i].placeP*top[j].placeP*1.25); cand.push(makeCand('ワイド',[top[i].num,top[j].num],p,typeOdds('ワイド',[top[i].num,top[j].num]))); cand.push(makeCand('馬連',[top[i].num,top[j].num],p*.55,typeOdds('馬連',[top[i].num,top[j].num])))} for(let i=0;i<Math.min(5,top.length);i++)for(let j=i+1;j<Math.min(5,top.length);j++)for(let k=j+1;k<Math.min(5,top.length);k++){const nums=[top[i].num,top[j].num,top[k].num]; cand.push(makeCand('3連複',nums,Math.min(.22,top[i].placeP*top[j].placeP*top[k].placeP*.95),typeOdds('3連複',nums)))} cand.sort((a,b)=>b.ev-a.ev); state.candidates=cand; state.tickets=cand.filter(c=>c.ev>=1.0).slice(0,state.settings.maxTickets); renderPrediction(); document.querySelector('[data-tab="result"]').click()}
function makeCand(type,nums,p,odds){const ev=p*odds; return{type,nums,p,odds,ev,kelly:Math.max(0,(ev-1)/(odds-1||1))}}
function renderPrediction(){const hs=state.horses.length,tk=state.tickets.length,avg=state.tickets.reduce((s,t)=>s+t.ev,0)/(tk||1); $('summaryGrid').innerHTML=`<div class="kpi"><b>${hs}</b><span>頭数</span></div><div class="kpi"><b>${tk}</b><span>採用買い目</span></div><div class="kpi"><b>${avg.toFixed(2)}</b><span>平均EV</span></div>`; $('ticketList').innerHTML=state.tickets.length?state.tickets.map((t,i)=>`<div class="ticket"><div><span class="chip">${esc(t.type)}</span> <b>${t.nums.join('-')}</b><div class="small">確率 ${(t.p*100).toFixed(1)}% / 推定${t.odds.toFixed(1)}倍 / EV ${t.ev.toFixed(2)}</div></div><div class="good">${yen(100)}</div></div>`).join(''):'<div class="small">EV基準を満たす買い目がありません。見送り推奨。</div>'; $('candBody').innerHTML=state.candidates.slice(0,80).map(c=>`<tr><td>${esc(c.type)}</td><td>${c.nums.join('-')}</td><td>${(c.p*100).toFixed(1)}%</td><td>${c.odds.toFixed(1)}</td><td class="${c.ev>=1.2?'good':c.ev>=1?'warn':'bad'}">${c.ev.toFixed(2)}</td><td>${(c.kelly*100).toFixed(1)}%</td></tr>`).join('')}
function fillSimResultUrl(){const id=currentRaceId||raceIdFromUrl($('raceUrl').value); if(!id)return alert('race_idがありません'); $('simResultUrl').value=resultUrl(kindFromRaceId(id),id)}
function numsFromText(s){return String(s||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).match(/\d{1,2}/g)?.map(Number).filter(n=>n>=1&&n<=18)||[]}
function hitTicket(t,finish){const n=t.nums.map(Number), f=finish.nums; if(t.type==='単勝')return f[0]===n[0]; if(t.type==='複勝')return f.slice(0,3).includes(n[0]); if(['ワイド','馬連'].includes(t.type))return n.every(x=>f.slice(0,t.type==='ワイド'?3:2).includes(x)); if(t.type==='3連複')return n.every(x=>f.slice(0,3).includes(x)); return false}
function runManualSimulation(){const finish={nums:numsFromText($('manualFinishNums').value)}; settleSim(finish)}
async function runSimulationFromResult(){const url=$('simResultUrl').value.trim(); if(!url)return alert('結果URLを入力してください'); $('simStatus').innerHTML='<div class="status"><span class="spinner"></span>結果取得中...</div>'; try{const html=await getText(url); const doc=new DOMParser().parseFromString(html,'text/html'); const text=norm(doc.body?.textContent||html); let nums=[]; doc.querySelectorAll('tr').forEach(tr=>{if(nums.length>=3)return; const raw=norm(tr.textContent); if(/^\s*[123]\s/.test(raw)&&tr.querySelector('a[href*="/horse/"]')){const m=raw.match(/^\s*\d+\s+(?:\d+\s+)?(\d{1,2})\s/); if(m)nums.push(+m[1])}}); if(nums.length<3){const m=text.match(/着順[\s\S]{0,120}?(\d{1,2})[\s\S]{0,40}?(\d{1,2})[\s\S]{0,40}?(\d{1,2})/); if(m)nums=[+m[1],+m[2],+m[3]]} if(nums.length<2)throw new Error('着順を読めませんでした。手入力を使ってください。'); settleSim({nums}); $('simStatus').innerHTML='<div class="status ok">✅ 結果取得・精算しました</div>'}catch(e){$('simStatus').innerHTML='<div class="status err">❌ '+esc(e.message)+'</div>'}}
function settleSim(finish){const unit=100; let stake=0,ret=0; const rows=state.tickets.map(t=>{stake+=unit; const hit=hitTicket(t,finish); const pay=hit?Math.round(t.odds*unit/10)*10:0; ret+=pay; return{t,hit,pay}}); const profit=ret-stake; $('simSummary').innerHTML=`<div class="summary"><div class="kpi"><b>${yen(stake)}</b><span>投資</span></div><div class="kpi"><b>${yen(ret)}</b><span>回収</span></div><div class="kpi"><b class="${profit>=0?'good':'bad'}">${yen(profit)}</b><span>収支</span></div></div><div class="small" style="margin-top:8px">着順: ${finish.nums.join(' - ')}</div>`; $('simTicketList').innerHTML=rows.length?rows.map(r=>`<div class="ticket ${r.hit?'hit':'miss'}"><div><span class="chip">${esc(r.t.type)}</span> <b>${r.t.nums.join('-')}</b><div class="small">${r.hit?'的中':'不的中'} / ${r.t.odds.toFixed(1)}倍</div></div><div class="${r.hit?'good':'bad'}">${yen(r.pay)}</div></div>`).join(''):'推奨買い目がありません'; document.querySelector('[data-tab="sim"]').click()}
function testProxy(){localStorage.tk_proxy=$('proxyUrl').value.trim()||DEFAULT_PROXY; state.settings.proxyUrl=localStorage.tk_proxy; $('proxyStatus').innerHTML='保存しました。'}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); document.querySelectorAll('section[id^="tab-"]').forEach(s=>s.classList.add('hide')); $('tab-'+b.dataset.tab).classList.remove('hide')});
$('pickDate').value=todayYmd(); $('proxyUrl').value=state.settings.proxyUrl; $('pickKind').onchange=populateVenues; populateVenues(); renderHorses();
</script>
