<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>The競馬 EV分析 v5.19.4</title>
<style>
:root{--bg:#07111f;--panel:#142136;--panel2:#1c2940;--line:#344159;--txt:#f3f6fb;--mut:#aab4c5;--green:#00e676;--red:#ff7b93;--yellow:#ffd166;--blue:#73a7ff;--shadow:0 12px 38px rgba(0,0,0,.38)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06101e,#0a1424 45%,#050b15);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{max-width:980px;margin:0 auto;padding:18px 14px 80px}.top{display:flex;align-items:center;gap:14px;padding:20px 4px 18px;border-bottom:1px solid #24435b}.icon{width:56px;height:56px;border-radius:16px;background:radial-gradient(circle at 30% 30%,#7cffb6,#00d86b 55%,#068445);display:grid;place-items:center;font-size:30px;box-shadow:0 0 28px rgba(0,230,118,.55)}h1{font-size:27px;margin:0;font-weight:800}.ver{margin-left:auto;color:var(--mut)}.tabs{display:flex;gap:10px;overflow:auto;padding:18px 0}.tab{border:1px solid var(--line);background:#182438;color:var(--mut);padding:13px 19px;border-radius:14px;font-weight:800;white-space:nowrap}.tab.active{background:linear-gradient(180deg,#18e982,#00c965);color:#07111f;border-color:#19ff93;box-shadow:0 0 22px rgba(0,230,118,.45)}.card{background:linear-gradient(180deg,#1c2940,#142136);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}.title{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:22px;font-weight:850;margin:0 0 20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}.full{grid-column:1/-1}label{display:block;color:var(--mut);margin:0 0 8px;font-weight:700}input,select,textarea{width:100%;border:1px solid #3a4861;background:#172236;color:var(--txt);border-radius:14px;padding:14px 16px;outline:none;min-height:52px}textarea{min-height:92px}.row{display:flex;gap:10px;align-items:center}.row>*{flex:1}.btn{border:0;border-radius:15px;background:linear-gradient(180deg,#18e982,#00c965);color:#06101e;padding:15px 18px;font-weight:900;box-shadow:0 0 20px rgba(0,230,118,.42)}.btn.secondary{background:#202d44;color:var(--txt);border:1px solid var(--line);box-shadow:none}.btn.warn{background:linear-gradient(180deg,#ffd166,#f59e0b)}.msg{padding:13px 15px;border-radius:13px;margin:12px 0;background:#263149;color:var(--mut);border:1px solid #3a4861}.msg.ok{background:rgba(0,230,118,.11);border-color:rgba(0,230,118,.45);color:#b9ffd7}.msg.bad{background:rgba(255,123,147,.13);border-color:rgba(255,123,147,.45);color:#ff9cac}.msg.warn{background:rgba(255,209,102,.13);border-color:rgba(255,209,102,.45);color:#ffe09b}.mini{font-size:12px;color:var(--mut);line-height:1.55}.pill{display:inline-flex;gap:6px;align-items:center;background:#263149;border:1px solid #3a4861;border-radius:999px;padding:6px 10px;color:#d8e2ef;font-size:12px;margin:3px}.raceList{display:grid;gap:10px}.raceItem{border:1px solid #3a4861;background:#182438;border-radius:16px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.raceMain{font-weight:850}.raceSub{color:var(--mut);font-size:12px;margin-top:4px}.raceItem.selected{border-color:#00e676;box-shadow:0 0 0 1px #00e676 inset}.tableWrap{overflow:auto;border:1px solid #3a4861;border-radius:16px}table{width:100%;border-collapse:collapse;min-width:680px;background:#111b2d}th,td{border-bottom:1px solid #2d3a52;padding:10px 11px;text-align:left;white-space:nowrap}th{background:#202d44;color:#cbd5e1;position:sticky;top:0}td.num{font-weight:900;color:#b9ffd7}.hidden{display:none!important}@media(max-width:640px){.grid{grid-template-columns:1fr}.top{padding-top:12px}h1{font-size:24px}.card{padding:17px;border-radius:20px}.row{flex-direction:column}.row>*{width:100%}.raceItem{grid-template-columns:1fr}.ver{font-size:14px}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="icon">♞</div><h1>The競馬 EV分析</h1><div class="ver">v5.19.4</div></div>
  <div class="tabs"><button class="tab active" data-tab="data">🏇 馬データ</button><button class="tab" data-tab="rec">📊 推奨買い目</button><button class="tab" data-tab="sim">♞ シミュレーション</button><button class="tab" data-tab="log">🧾 ログ</button></div>

  <section id="tab-data">
    <div class="card">
      <h2 class="title">🌐 NETKEIBAから自動取得</h2>
      <div class="grid">
        <div><label>日付</label><input id="date" type="date"></div>
        <div><label>区分</label><select id="kind"><option>JRA</option><option>NAR</option></select></div>
        <div><label>開催場</label><select id="venue"><option value="">開催場を選んでください</option></select></div>
        <div><label>操作</label><button id="btnList" class="btn secondary">🗓 レース一覧</button></div>
        <div class="full"><label>レース選択</label><div class="row"><select id="raceSelect"><option value="">開催場を選んでレース一覧を取得</option></select><button id="btnReflect" class="btn secondary">URL反映</button></div></div>
        <div class="full"><label>レースURL（netkeiba.com の出馬表ページ）</label><input id="url" placeholder="race_id=... を含むURL、または race_id のみでも可"></div>
      </div>
      <div id="status" class="msg">race_idを主キー、レース名を照合キーとして扱います。</div>
      <button id="btnFetch" class="btn" style="width:100%;margin-top:8px">🔄 レースデータ取得</button>
    </div>

    <div class="card">
      <h2 class="title">🧩 race_id + レース名 整合性</h2>
      <div id="identity" class="mini">未取得</div>
    </div>

    <div class="card">
      <h2 class="title">🐎 出走馬・オッズ・人気</h2>
      <div id="horses" class="mini">まだデータがありません。</div>
    </div>
  </section>

  <section id="tab-rec" class="hidden"><div class="card"><h2 class="title">📊 推奨買い目</h2><div id="recs">馬データ取得後に自動生成します。</div></div></section>
  <section id="tab-sim" class="hidden"><div class="card"><h2 class="title">♞ シミュレーション</h2><div id="sim">候補生成後に表示します。</div></div></section>
  <section id="tab-log" class="hidden"><div class="card"><h2 class="title">🧾 ログ</h2><div id="logs"></div></div></section>
</div>
<script>
(()=>{'use strict';
const APP_VERSION='5.19.3-raceid-main-text-support';
const STORE='the-keiba-ev-v5191';
const DEFAULT_PROXY='https://takuya.nitta-katsuhiko.workers.dev/';
const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const txt=e=>(e?.textContent||'').replace(/\s+/g,' ').trim();
const ymd=d=>String(d||'').replace(/-/g,'');
const jpDate=d=>String(d||'').replace(/-/g,'/');
const weekday=d=>['日','月','火','水','木','金','土'][new Date(d+'T00:00:00+09:00').getDay()]||'';
const norm=s=>String(s||'').normalize('NFKC').replace(/[\s　・（）()［］\[\]【】]/g,'').replace(/ステークス/g,'S').toLowerCase();
const state=Object.assign({date:'',kind:'JRA',venue:'',raceId:'',raceName:'',raceMaster:{},horses:[],logs:[],recs:[],tickets:[]}, JSON.parse(localStorage.getItem(STORE)||'{}'));
function save(){localStorage.setItem(STORE,JSON.stringify(state));}
function log(kind,msg,obj){state.logs.unshift({time:new Date().toLocaleString('ja-JP'),kind,msg,obj:obj||null});state.logs=state.logs.slice(0,80);save();renderLogs();}
function setStatus(msg,type=''){const el=$('#status');el.className='msg '+type;el.innerHTML=msg;}
function parseHtml(html){return new DOMParser().parseFromString(html,'text/html');}
function absolute(url){try{return new URL(url,location.href).href}catch{return url}}
function proxyUrl(url){const p=DEFAULT_PROXY; if(!p)return url; if(p.includes('{url}'))return p.replace('{url}',encodeURIComponent(url)); return p + (p.includes('?')?'&url=':'?url=') + encodeURIComponent(url);}
async function fetchText(url){const u=absolute(url); let last; for(const target of [u, proxyUrl(u)]){try{const r=await fetch(target,{credentials:'omit',cache:'no-store'}); if(r.ok){const t=await r.text(); if(t&&t.length>100)return t;} last='HTTP '+r.status;}catch(e){last=e.message;}} throw new Error('取得失敗: '+last);}
function ridFromUrl(s){return (String(s||'').match(/race_id=(\d{10,14})/)||String(s||'').match(/^(\d{10,14})$/)||[])[1]||'';}
function shutubaUrl(rid,kind){const nar=kind==='NAR'||/^20\d{2}(3[0-9]|4[0-9]|5[0-9])/.test(rid); const host=nar?'https://nar.netkeiba.com':'https://race.netkeiba.com'; return host+'/race/shutuba.html?race_id='+encodeURIComponent(rid)+'&rf=race_submenu';}
function resultUrl(rid,kind){const nar=kind==='NAR'||/^20\d{2}(3[0-9]|4[0-9]|5[0-9])/.test(rid); const host=nar?'https://nar.netkeiba.com':'https://race.netkeiba.com'; return host+'/race/result.html?race_id='+encodeURIComponent(rid)+'&rf=race_submenu';}
function raceListUrl(date,kind){const d=ymd(date); return (kind==='NAR'?'https://nar.netkeiba.com/top/race_list.html?kaisai_date=':'https://race.netkeiba.com/top/race_list.html?kaisai_date=')+d;}
function findNearbyVenue(a){let n=a; for(let i=0;i<8&&n;i++,n=n.parentElement){const block=txt(n); const m=block.match(/(札幌|函館|福島|新潟|東京|中山|中京|京都|阪神|小倉|門別|盛岡|水沢|浦和|船橋|大井|川崎|金沢|笠松|名古屋|園田|姫路|高知|佐賀|帯広)/); if(m)return m[1];} return '';}
const JRA_VENUE_BY_CODE={"01":"札幌","02":"函館","03":"福島","04":"新潟","05":"東京","06":"中山","07":"中京","08":"京都","09":"阪神","10":"小倉"};
function venueFromRaceId(rid,kind){rid=String(rid||''); if(kind==='JRA'){return JRA_VENUE_BY_CODE[rid.slice(4,6)]||'';} return '';}
function raceNoFromRaceId(rid){const n=Number(String(rid||'').slice(-2)); return n>=1&&n<=18?n:0;}
function cleanRaceName(raw,raceNo){let s=String(raw||'').normalize('NFKC').replace(/\s+/g,' ').trim(); s=s.replace(/^[0-9]{4}[\/\-][0-9]{1,2}[\/\-][0-9]{1,2}\s*/,''); s=s.replace(new RegExp('^'+raceNo+'R\\s*'),''); s=s.replace(/出馬表|オッズ|結果|予想|レース情報|メインメニュー|頭|発走|映像|調教|厩舎コメント/g,' ').replace(/\s+/g,' ').trim(); if(!s||/^\d+$/.test(s)||s.length>28)return ''; return s;}
function parseRaceList(html,date,kind){
  const doc=parseHtml(html); const map={}; const targetYmd=ymd(date);
  function ridOk(rid,href,block){
    rid=String(rid||'').replace(/\D/g,'');
    if(!/^\d{12}$/.test(rid))return false;
    if(kind==='JRA' && !JRA_VENUE_BY_CODE[rid.slice(4,6)])return false;
    if(kind==='NAR' && JRA_VENUE_BY_CODE[rid.slice(4,6)]){/* NARは厳格にしない */}
    const no=raceNoFromRaceId(rid); if(!no)return false;
    const h=String(href||''); const b=String(block||'');
    if(/ipat|bet|purchase|login|mypage|odds|result|movie|yoso|db|premium/i.test(h))return false;
    if(isBadRaceLabel(b))return false;
    return true;
  }
  function addRace(rid,rawName,rawVenue,href,block){
    rid=String(rid||'').replace(/\D/g,''); if(!ridOk(rid,href,block))return;
    const raceNo=raceNoFromRaceId(rid); const venue=rawVenue||venueFromRaceId(rid,kind)||'';
    const raceName=cleanRaceName(rawName,raceNo)||`${raceNo}R`;
    const old=map[rid];
    if(!old || (old.raceName===`${old.raceNo}R` && raceName!==`${raceNo}R`) || (raceName!==`${raceNo}R` && raceName.length>old.raceName.length)){
      map[rid]={raceId:rid,raceName,raceNo,venue,kind,date,weekday:weekday(date),url:shutubaUrl(rid,kind),resultUrl:resultUrl(rid,kind),raceHash:`${date}_${venue}_${raceNo}_${norm(raceName)}`};
    }
  }
  $$call(doc,'a[href*=race_id],a[data-race-id],*[data-race-id]').forEach(a=>{
    const href=a.getAttribute('href')||''; const rid=ridFromUrl(href)||a.getAttribute('data-race-id')||''; if(!rid)return;
    const block=txt(a.closest('li,div,tr,dd,dt')||a); const raceNo=raceNoFromRaceId(rid);
    let label=txt(a); if(!label||label.length<2)label=block;
    let m=block.match(new RegExp('(?:^|\\s)'+raceNo+'R\\s*([^\\s/／｜|]+)'));
    addRace(rid,m?.[1]||label,findNearbyVenue(a),href,block);
  });
  // URL全体からの race_id 拾いは導線/広告/投票リンクが混ざりやすいので、shutuba 近傍だけに限定する。
  Array.from(String(html).matchAll(/(?:shutuba\.html[^\n\r"'<>]{0,160}?race_id=|race_id=)(\d{12})/g)).forEach(m=>{
    const around=String(html).slice(Math.max(0,m.index-120),m.index+220);
    if(/shutuba\.html|出馬表|RaceList|RaceName/.test(around))addRace(m[1],'',venueFromRaceId(m[1],kind),'',around);
  });
  return Object.values(map).sort((a,b)=>(a.venue||'').localeCompare(b.venue||'ja')||a.raceNo-b.raceNo||String(a.raceId).localeCompare(String(b.raceId)));
}
function $$call(root,sel){return Array.from(root.querySelectorAll(sel));}
async function enrichRaceNamesFromShutuba(races){
  const targets=(races||[]).filter(r=>r&&r.raceId).slice(0,48);
  let done=0;
  for(const r of targets){
    try{
      setStatus(`出馬表本文でレース名を補正中… ${++done}/${targets.length}`,'warn');
      const html=await fetchText(r.url||shutubaUrl(r.raceId,r.kind));
      const doc=parseHtml(html); const name=parseRaceName(doc);
      if(name){r.raceName=name; r.raceHash=`${r.date}_${r.venue}_${r.raceNo}_${norm(name)}`;}
    }catch(e){/* 本文補正に失敗しても一覧表示は止めない */}
  }
  return races;
}
async function loadRaceList(){const date=$('#date').value; const kind=$('#kind').value; if(!date){setStatus('日付を選んでください','bad');return;} state.date=date; state.kind=kind; save(); setStatus('レース一覧を取得中…','warn'); const html=await fetchText(raceListUrl(date,kind)); let races=parseRaceList(html,date,kind); state.raceMaster={}; state.raceId=''; state.raceName=''; state.current=null; state.horses=[]; state.recs=[]; state.tickets=[]; if(races.length){races=await enrichRaceNamesFromShutuba(races);} races.forEach(r=>state.raceMaster[r.raceId]=r); const venues=[...new Set(races.map(r=>r.venue).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ja')); if(venues.length===1)state.venue=venues[0]; else if(!venues.includes(state.venue))state.venue=''; renderVenue(venues); renderRaceSelect(); renderAll(); setStatus(races.length?`${jpDate(date)}（${weekday(date)}） ${kind}：開催場${venues.length}場 / ${races.length}レース取得。race_id厳格抽出＋IPAT/導線除外で取得しました。`:`${jpDate(date)} は${kind}のレースが見つかりません。前回race_idは使用していません。` , races.length?'ok':'bad'); log('一覧取得',`${kind} ${date} ${races.length}件`);}
function renderVenue(venues){const v=$('#venue'); const current=venues.includes(state.venue)?state.venue:''; state.venue=current; v.innerHTML='<option value="">開催場を選んでください</option>'+venues.map(x=>`<option value="${esc(x)}" ${x===current?'selected':''}>${esc(x)}</option>`).join(''); save();}
function renderRaceSelect(){const venue=$('#venue').value; const all=Object.values(state.raceMaster); const races=all.filter(r=>venue&&r.venue===venue).sort((a,b)=>a.raceNo-b.raceNo); const s=$('#raceSelect'); if(!all.length){s.innerHTML='<option value="">日付を選ぶと開催場を自動取得します</option>';return;} if(!venue){s.innerHTML='<option value="">先に開催場を選んでください</option>';return;} s.innerHTML='<option value="">レースを選択</option>'+races.map(r=>`<option value="${esc(r.raceId)}" ${r.raceId===state.raceId?'selected':''}>${esc(r.weekday)}曜 ${esc(r.venue||'開催場?')} ${r.raceNo}R ${esc(r.raceName)} [${esc(r.raceId)}]</option>`).join('');}
function reflectUrl(){const rid=$('#raceSelect').value; if(!rid)return; const r=state.raceMaster[rid]; state.raceId=rid; state.raceName=r?.raceName||''; state.venue=r?.venue||''; $('#url').value=r?.url||shutubaUrl(rid,state.kind); save(); renderIdentity();}
function parseRaceName(doc){
  const selectors=['.RaceName','.race_name','h1','.RaceList_NameBox .RaceName'];
  for(const sel of selectors){const raw=txt(doc.querySelector(sel)); const v=cleanRaceName(raw,0); if(v)return v;}
  // JSON-LDやメタ情報にレース名が入る場合を優先。ただしIPAT等は除外。
  const metas=$$call(doc,'meta[property="og:title"],meta[name="twitter:title"],meta[name="description"]');
  for(const m of metas){const v=cleanRaceName((m.getAttribute('content')||'').replace(/\|.*$/,''),0); if(v)return v;}
  const title=String(doc.querySelector('title')?.textContent||'').replace(/\|.*$/,'').replace(/出馬表.*$/,'').replace(/オッズ.*$/,'').trim();
  const t=cleanRaceName(title,0); if(t)return t;
  const text=txt(doc.body||doc);
  const m=text.match(/(?:^|\s)([\p{Script=Han}\p{Script=Katakana}A-Za-z0-9ー・]{2,18})(?:\s*\([^)]*\))?\s*(?:出馬表)/u);
  return cleanRaceName(m?.[1]||'',0);
}
function parseHorses(doc){const horses=[]; const seen=new Set(); const tables=$$call(doc,'table'); tables.forEach(table=>{const rows=$$call(table,'tr'); let header=[]; rows.forEach(tr=>{const cells=$$call(tr,'th,td').map(txt); if(cells.some(c=>/馬番/.test(c))&&cells.some(c=>/馬名/.test(c))){header=cells;return;} if(!header.length||cells.length<3)return; const idx=rx=>header.findIndex(h=>rx.test(h)); const iNum=idx(/馬番/), iFrame=idx(/枠/), iName=idx(/馬名/), iOdds=idx(/単勝|オッズ/), iPop=idx(/人気/), iJockey=idx(/騎手/), iWeight=idx(/斤量/); if(iNum<0||iName<0)return; const num=Number(String(cells[iNum]||'').replace(/\D/g,'')); if(!num||num<1||num>18||seen.has(num))return; const link=$$call(tr,'a').find(a=>/horse/.test(a.href)); if(!link)return; const name=txt(link)||cells[iName]; if(!name)return; seen.add(num); horses.push({num,frame:Number(String(cells[iFrame]||'').replace(/\D/g,''))||'',name,odds:Number(String(cells[iOdds]||'').replace(/[^\d.]/g,''))||'',pop:Number(String(cells[iPop]||'').replace(/\D/g,''))||'',jockey:iJockey>=0?cells[iJockey]:'',weight:iWeight>=0?cells[iWeight]:''});});}); return horses.sort((a,b)=>a.num-b.num);}
async function fetchRace(){let input=$('#url').value.trim(); let rid=ridFromUrl(input)||$('#raceSelect').value; if(!rid){setStatus('race_idを含むURL、またはレース選択が必要です','bad');return;} const master=state.raceMaster[rid]||{}; const url=input&&input.includes('http')?input:shutubaUrl(rid,state.kind); setStatus('出馬表を取得中…','warn'); const html=await fetchText(url); const doc=parseHtml(html); const pageName=parseRaceName(doc)||master.raceName||`第${rid.slice(-2)}R`; const horses=parseHorses(doc); const nameOk=!master.raceName||norm(master.raceName)===norm(pageName)||norm(pageName).includes(norm(master.raceName))||norm(master.raceName).includes(norm(pageName)); const dateOk=!master.date||master.date===state.date; state.raceId=rid; state.raceName=pageName; state.horses=horses; state.current={raceId:rid,masterName:master.raceName||'',pageName,venue:master.venue||'',raceNo:master.raceNo||Number(rid.slice(-2)),date:master.date||state.date,kind:master.kind||state.kind,url,nameOk,dateOk,identityOk:nameOk&&dateOk}; generateRecs(); save(); renderAll(); const klass=horses.length>=2&&nameOk&&dateOk?'ok':'warn'; setStatus(`${pageName} / 出走馬${horses.length}頭。${nameOk?'レース名照合OK':'⚠ race_idとレース名が不一致の可能性'}。`,klass); log('取得',`${pageName} ${horses.length}頭`,state.current);}
function renderIdentity(){const c=state.current||{}; const rid=state.raceId||''; const master=state.raceMaster[rid]||{}; $('#identity').innerHTML=`<span class="pill">主キー race_id: ${esc(rid||'-')}</span><span class="pill">表示照合: ${esc(c.pageName||state.raceName||master.raceName||'-')}</span><span class="pill">日付: ${esc(master.date||state.date||'-')}</span><span class="pill">開催: ${esc(master.venue||'-')}</span><span class="pill">R: ${esc(master.raceNo||rid.slice(-2)||'-')}</span><div class="msg ${c.identityOk?'ok':c.raceId?'warn':''}">${c.raceId?(c.identityOk?'race_id + レース名 + 日付 の整合性OK':'⚠ race_id / レース名 / 日付のどれかが不一致です。キャッシュを疑って再取得してください。'):'未取得'}</div>`;}
function renderHorses(){if(!state.horses.length){$('#horses').textContent='まだデータがありません。';return;} $('#horses').innerHTML=`<div class="tableWrap"><table><thead><tr><th>馬番</th><th>枠</th><th>馬名</th><th>単勝オッズ</th><th>人気</th><th>騎手</th><th>斤量</th></tr></thead><tbody>${state.horses.map(h=>`<tr><td class="num">${h.num}</td><td>${esc(h.frame)}</td><td>${esc(h.name)}</td><td>${esc(h.odds||'')}</td><td>${esc(h.pop||'')}</td><td>${esc(h.jockey)}</td><td>${esc(h.weight)}</td></tr>`).join('')}</tbody></table></div>`;}
function prob(h){if(Number(h.odds)>1)return 1/Number(h.odds); if(Number(h.pop)>0)return 1/Math.pow(Number(h.pop)+1.2,1.15); return 1/Math.max(1,state.horses.length);}
function generateRecs(){const hs=state.horses.map(h=>({...h,p:prob(h)})); const total=hs.reduce((a,b)=>a+b.p,0)||1; hs.forEach(h=>{h.winP=h.p/total;h.placeP=Math.min(.86,h.winP*2.7+.04);}); hs.sort((a,b)=>b.winP-a.winP); const rec=[]; hs.slice(0,6).forEach(h=>{const odds=Number(h.odds)||Math.max(1.1,1/h.winP); rec.push({type:'単勝',combo:String(h.num),name:h.name,p:h.winP,odds,ev:h.winP*odds}); rec.push({type:'複勝',combo:String(h.num),name:h.name,p:h.placeP,odds:Math.max(1.1,odds*.35),ev:h.placeP*Math.max(1.1,odds*.35)});}); for(let i=0;i<Math.min(5,hs.length);i++)for(let j=i+1;j<Math.min(7,hs.length);j++){const a=hs[i],b=hs[j],base=Math.sqrt((Number(a.odds)||8)*(Number(b.odds)||8)); rec.push({type:'ワイド',combo:[a.num,b.num].sort((x,y)=>x-y).join('-'),name:a.name+' / '+b.name,p:Math.min(.55,a.placeP*b.placeP*1.35),odds:Math.max(1.1,base*.75),ev:Math.min(.55,a.placeP*b.placeP*1.35)*Math.max(1.1,base*.75)}); rec.push({type:'馬連',combo:[a.num,b.num].sort((x,y)=>x-y).join('-'),name:a.name+' / '+b.name,p:Math.min(.32,a.winP*b.winP*4.1),odds:Math.max(1.1,base*1.6),ev:Math.min(.32,a.winP*b.winP*4.1)*Math.max(1.1,base*1.6)});} state.recs=rec.sort((a,b)=>b.ev-a.ev).slice(0,12); state.tickets=state.recs.slice(0,8).map(r=>({...r,amount:100}));}
function renderRecs(){if(!state.recs.length){$('#recs').textContent='馬データ取得後に自動生成します。';return;} $('#recs').innerHTML=`<div class="tableWrap"><table><thead><tr><th>券種</th><th>買い目</th><th>対象</th><th>想定確率</th><th>想定オッズ</th><th>EV</th></tr></thead><tbody>${state.recs.map(r=>`<tr><td>${esc(r.type)}</td><td class="num">${esc(r.combo)}</td><td>${esc(r.name)}</td><td>${(r.p*100).toFixed(1)}%</td><td>${r.odds.toFixed(1)}</td><td>${r.ev.toFixed(2)}</td></tr>`).join('')}</tbody></table></div>`;}
function renderSim(){if(!state.tickets.length){$('#sim').textContent='候補がありません。';return;} const stake=state.tickets.reduce((a,b)=>a+Number(b.amount||0),0); $('#sim').innerHTML=`<div class="msg ${state.tickets.some(t=>t.odds*t.amount>=stake)?'ok':'warn'}">自動候補 ${state.tickets.length}点 / 投資 ${stake.toLocaleString()}円 / ${state.tickets.some(t=>t.odds*t.amount>=stake)?'トリガミ回避候補あり':'⚠ トリガミ注意'}</div><div class="tableWrap"><table><thead><tr><th>券種</th><th>買い目</th><th>金額</th><th>的中時想定</th><th>警告</th></tr></thead><tbody>${state.tickets.map(t=>`<tr><td>${esc(t.type)}</td><td class="num">${esc(t.combo)}</td><td>100円</td><td>${Math.round(t.odds*100).toLocaleString()}円</td><td>${t.odds*100>=stake?'OK':'⚠'}</td></tr>`).join('')}</tbody></table></div>`;}
function renderLogs(){ $('#logs').innerHTML=state.logs.map(l=>`<div class="msg"><b>${esc(l.kind)}</b> <span class="mini">${esc(l.time)}</span><br>${esc(l.msg)}</div>`).join('')||'ログなし';}
function renderAll(){renderRaceSelect();renderIdentity();renderHorses();renderRecs();renderSim();renderLogs();}
$$('.tab').forEach(b=>b.onclick=()=>{$$('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['data','rec','sim','log'].forEach(k=>$('#tab-'+k).classList.toggle('hidden',k!==b.dataset.tab));});
let autoTimer=null;
function autoLoadRaceList(){clearTimeout(autoTimer); autoTimer=setTimeout(()=>loadRaceList().catch(e=>{setStatus(e.message,'bad');log('ERROR',e.message)}),250);}
$('#btnList').onclick=()=>loadRaceList().catch(e=>{setStatus(e.message,'bad');log('ERROR',e.message)});
$('#date').onchange=autoLoadRaceList;
$('#kind').onchange=()=>{state.kind=$('#kind').value; state.venue=''; save(); autoLoadRaceList();};
$('#venue').onchange=()=>{state.venue=$('#venue').value; state.raceId=''; state.raceName=''; save();renderRaceSelect();renderIdentity();};
$('#raceSelect').onchange=reflectUrl; $('#btnReflect').onclick=reflectUrl; $('#btnFetch').onclick=()=>fetchRace().catch(e=>{setStatus(e.message,'bad');log('ERROR',e.message)});
$('#date').value=state.date||new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'}); $('#kind').value=state.kind||'JRA'; if(state.raceId)$('#url').value=state.current?.url||shutubaUrl(state.raceId,state.kind); renderAll(); if(!Object.keys(state.raceMaster||{}).length){setStatus('日付を選択すると、その日に開催がある開催場だけを自動取得します。','');}
})();
</script>
