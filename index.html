<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>The競馬 EV分析 v5.30.1</title>
<style>
:root{--bg:#07111d;--panel:#132033;--card:#202d45;--line:#334155;--txt:#e5edf7;--mut:#93a4b8;--green:#00e676;--red:#fb7185;--yellow:#fbbf24;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 90% 0,rgba(59,130,246,.16),transparent 30%),linear-gradient(#07111d,#070b14);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px}.header{position:sticky;top:0;z-index:5;padding:14px 16px;background:rgba(7,17,29,.96);border-bottom:1px solid rgba(0,230,118,.22);display:flex;justify-content:space-between;align-items:center}.brand{font-weight:900;font-size:17px}.ico{display:inline-flex;align-items:center;justify-content:center;width:31px;height:31px;border-radius:10px;margin-right:8px;background:linear-gradient(135deg,#b8ffd7,#00e676,#008944);color:#02140b;box-shadow:0 0 18px rgba(0,230,118,.45)}.ver{font-size:11px;color:var(--mut)}.wrap{max-width:720px;margin:auto;padding:12px}.tabs{display:flex;gap:6px;overflow:auto;margin-bottom:12px}.tab{white-space:nowrap;border:1px solid var(--line);background:#1b2940;color:var(--mut);border-radius:9px;padding:8px 12px;font-weight:800}.tab.on{background:linear-gradient(135deg,#00b35f,#00e676);color:#02140b;border-color:#00e676}.card{background:linear-gradient(180deg,rgba(32,45,69,.96),rgba(18,30,50,.96));border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 16px 40px rgba(0,0,0,.22)}h2{margin:0 0 12px;font-size:13px;color:var(--mut);letter-spacing:.06em;text-transform:uppercase}label{display:block;font-size:12px;color:var(--mut);margin:8px 0 4px}input,select,textarea{width:100%;border:1px solid var(--line);background:#0f1d30;color:var(--txt);border-radius:9px;padding:10px;font:inherit}button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}.btn{width:100%;border:0;border-radius:10px;padding:11px 14px;font-weight:900;background:linear-gradient(135deg,#00b35f,#00e676);color:#02140b;margin-top:8px}.btn2{border:1px solid var(--line);background:#142238;color:var(--txt);border-radius:8px;padding:8px 10px;font-weight:800}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.status{margin-top:8px;padding:8px 10px;border-radius:8px;font-size:12px}.ok{background:rgba(0,230,118,.12);color:#86efac}.err{background:rgba(251,113,133,.12);color:#fda4af}.info{background:rgba(96,165,250,.12);color:#bfdbfe}.hide{display:none}.row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.table{width:100%;border-collapse:collapse;font-size:12px}.table th,.table td{border-bottom:1px solid rgba(51,65,85,.65);padding:7px;text-align:left;white-space:nowrap}.table th{color:var(--mut);background:#142238}.horse{display:grid;grid-template-columns:50px 1fr 72px 50px 32px;gap:6px;margin-bottom:6px}.horse button{background:transparent;color:var(--mut);border:1px solid var(--line);border-radius:8px}.pill{display:inline-block;border:1px solid rgba(0,230,118,.35);background:rgba(0,230,118,.1);color:#a7f3d0;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900}.warn{color:var(--yellow)}@media(max-width:560px){.grid{grid-template-columns:1fr}.horse{grid-template-columns:42px 1fr 62px 44px 30px}}
</style></head><body><div class="header"><div class="brand"><span class="ico">♞</span>The競馬 EV分析</div><div><span class="ver">v5.30.1</span> <span class="pill" id="kindBadge">NAR</span></div></div><div class="wrap">
<div class="tabs"><button class="tab on" data-tab="race" type="button">🐎 馬データ</button><button class="tab" data-tab="rec" type="button">📊 推奨買い目</button><button class="tab" data-tab="sim" type="button">♞ シミュレーション</button><button class="tab" data-tab="set" type="button">⚙️ 設定</button><button class="tab" data-tab="proxy" type="button">🌐 プロキシ</button></div>
<section id="tab-race"><div class="card"><h2>Race_id 優先レース取得</h2><div class="grid"><div><label>日付</label><input type="date" id="pickDate"></div><div><label>区分</label><select id="kind"><option>NAR</option><option>JRA</option></select></div></div><div class="grid"><div><label>開催場</label><select id="venue"><option value="">先に一覧取得</option></select></div><div><label>レース</label><select id="raceSel"><option value="">先に一覧取得</option></select></div></div><button class="btn" id="listBtn" type="button">📅 開催場・レース一覧取得</button><label>レースURL</label><input id="raceUrl" placeholder="race_id入りURL"><div id="raceStatus"></div><button class="btn" id="fetchBtn" type="button">🔄 レースデータ取得</button></div><div class="card"><h2>出走馬データ <span id="raceName" class="pill"></span></h2><div class="horse" style="font-size:11px;color:var(--mut)"><span>馬番</span><span>馬名</span><span>単勝</span><span>人気</span><span></span></div><div id="horses"></div><button class="btn2" id="addHorse" type="button">＋ 手動追加</button><button class="btn" id="calcBtn" type="button">📐 EV計算・買い目推奨</button></div></section>
<section id="tab-rec" class="hide"><div class="card"><h2>推奨買い目</h2><div id="tickets" class="info status">まだ計算していません。</div></div><div class="card"><h2>全候補</h2><div style="overflow:auto"><table class="table"><thead><tr><th>券種</th><th>組合せ</th><th>確率</th><th>想定オッズ</th><th>EV</th></tr></thead><tbody id="cand"></tbody></table></div></div></section>
<section id="tab-sim" class="hide"><div class="card"><h2>シミュレーション</h2><div class="grid"><div><label>投資額</label><input id="bet" type="number" value="500" step="100"></div><div><label>払戻</label><input id="ret" type="number" value="0" step="10"></div></div><button class="btn" id="simBtn" type="button">収支記録</button><div id="simOut" class="status info">記録待ち</div></div></section>
<section id="tab-set" class="hide"><div class="card"><h2>設定</h2><div class="grid"><div><label>1R予算</label><input id="budget" type="number" value="500" step="100"></div><div><label>最大買い目</label><input id="maxTickets" type="number" value="8"></div></div><label><input id="anti" type="checkbox" checked style="width:auto"> トリガミ回避</label></div></section>
<section id="tab-proxy" class="hide"><div class="card"><h2>Cloudflare Workers プロキシ設定</h2><label>Workers URL</label><input id="proxyUrl" value="https://takuya.nitta-katsuhiko.workers.dev/" inputmode="url"><div id="proxyStatus"></div><button class="btn" id="testProxyBtn" type="button">🔗 接続テスト</button><p style="color:var(--mut);font-size:12px;line-height:1.7">この版は iPad Safari 対策として click / touchend / pointerup を全て束ね、透明レイヤーや form submit でボタンが死なないようにしています。</p></div></section>
</div><script>
(function(){'use strict';var $=function(id){return document.getElementById(id)},S={races:[],horses:[],cands:[],profit:0};function st(id,msg,cls){$(id).innerHTML='<div class="status '+(cls||'info')+'">'+msg+'</div>'}function ymd(d){return String(d||'').replace(/-/g,'')}function proxy(){var v=($('proxyUrl').value||localStorage.keiba_proxy_url||'https://takuya.nitta-katsuhiko.workers.dev/').trim().replace(/\/+$/,'');localStorage.keiba_proxy_url=v;return v}async function getText(url){var r=await fetch(proxy()+'?url='+encodeURIComponent(url+(url.indexOf('?')>-1?'&':'?')+'_tk='+Date.now()),{cache:'no-store',mode:'cors',credentials:'omit'});if(!r.ok)throw new Error('HTTP '+r.status);return await r.text()}function norm(s){var d=document.createElement('textarea');d.innerHTML=String(s||'');return d.value.replace(/<script[\s\S]*?<\/script>/gi,' ').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}function raceUrl(id){return ($('kind').value==='NAR'?'https://nar.netkeiba.com':'https://race.netkeiba.com')+'/race/shutuba.html?race_id='+id+'&rf=race_submenu'}function resultUrl(id){return ($('kind').value==='NAR'?'https://nar.netkeiba.com':'https://race.netkeiba.com')+'/race/result.html?race_id='+id+'&rf=race_submenu'}function raceIdFrom(u){return (String(u).match(/race_id=(\d{10,})/)||[])[1]||''}function cleanName(s){return String(s||'').replace(/^\d+R\s*/,'').replace(/出馬表|結果|レース一覧|netkeiba|地方競馬|JRA|NAR/g,'').replace(/[|｜].*$/,'').trim()}
function bindTabs(){document.querySelectorAll('.tab').forEach(function(b){b.addEventListener('click',function(e){e.preventDefault();document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');['race','rec','sim','set','proxy'].forEach(t=>$('tab-'+t).classList.toggle('hide',t!==b.dataset.tab))},{passive:false})})}
async function loadList(ev){ev&&ev.preventDefault();try{st('raceStatus','🔄 レース一覧取得中...','info');var k=$('kind').value,d=ymd($('pickDate').value),url=k==='NAR'?'https://nar.netkeiba.com/top/race_list.html?kaisai_date='+d:'https://race.netkeiba.com/top/race_list.html?kaisai_date='+d;if(!d)throw new Error('日付を選択してください');var html=await getText(url),ids=[...new Set((html.match(/race_id=\d{10,}/g)||[]).map(x=>x.replace(/\D/g,'')))];if(!ids.length){$('venue').innerHTML='<option value="">開催なし</option>';$('raceSel').innerHTML='<option value="">この日は開催がありません</option>';st('raceStatus','開催なし日','info');console.log('開催なし日');return}S.races=ids.map(function(id,i){var re=new RegExp('(?:race_id='+id+'[\\s\\S]{0,260}|[\\s\\S]{0,260}race_id='+id+')','i'),m=html.match(re),name=cleanName(norm(m&&m[0]||''))||((i+1)+'R');return{id:id,name:name,url:raceUrl(id),venue:id.slice(4,6),r:no(id)}});var venues=[...new Set(S.races.map(r=>r.venue))];$('venue').innerHTML=venues.map(v=>'<option value="'+v+'">開催場コード '+v+'</option>').join('');renderRaceSelect();st('raceStatus','✅ race_id基準で '+S.races.length+' レース取得','ok')}catch(e){console.error(e);st('raceStatus','❌ '+e.message,'err')}}function no(id){return parseInt(id.slice(-2),10)||0}function renderRaceSelect(){var v=$('venue').value;var a=S.races.filter(r=>!v||r.venue===v);$('raceSel').innerHTML=a.map(r=>'<option value="'+r.id+'">'+r.name+' / '+r.id+'</option>').join('');applyRace()}function applyRace(){var id=$('raceSel').value;if(!id)return;var r=S.races.find(x=>x.id===id)||{url:raceUrl(id),name:''};$('raceUrl').value=r.url;$('raceName').textContent=r.name||id}function parseHorses(html){var out=[],seen={};var rows=html.match(/<tr[\s\S]*?<\/tr>/gi)||[];rows.forEach(function(row){if(!/horse\//i.test(row)&&!/db\.netkeiba\.com\/horse/i.test(row))return;var t=norm(row),hm=row.match(/horse\/(\d+)/i),name=(row.match(/<a[^>]+horse[^>]*>([\s\S]*?)<\/a>/i)||[])[1];name=norm(name);var nums=(t.match(/(?:^|\s)(\d{1,2})(?:\s|$)/g)||[]).map(x=>parseInt(x,10)).filter(n=>n>=1&&n<=18);var n=nums[0];if(!n||seen[n])return;var pop=(t.match(/(\d{1,2})\s*人気/)||[])[1]||'';var odds='';var om=t.match(/(\d{1,2}\.\d)\s*(?:\d+人気)?/);if(om)odds=om[1];seen[n]=1;out.push({num:n,name:name||('馬'+n),odds:odds,pop:pop,horseId:hm&&hm[1]||''})});out.sort((a,b)=>a.num-b.num);return out.filter(x=>x.num>=1&&x.num<=18)}function renderHorses(){var h=$('horses');h.innerHTML='';S.horses.forEach(function(x,i){var d=document.createElement('div');d.className='horse';d.innerHTML='<input value="'+x.num+'"><input value="'+x.name.replace(/"/g,'&quot;')+'"><input value="'+(x.odds||'')+'"><input value="'+(x.pop||'')+'"><button type="button">×</button>';var ins=d.querySelectorAll('input');ins[0].oninput=function(){x.num=parseInt(this.value,10)||0};ins[1].oninput=function(){x.name=this.value};ins[2].oninput=function(){x.odds=parseFloat(this.value)||0};ins[3].oninput=function(){x.pop=parseInt(this.value,10)||''};d.querySelector('button').onclick=function(){S.horses.splice(i,1);renderHorses()};h.appendChild(d)})}async function fetchRace(ev){ev&&ev.preventDefault();try{st('raceStatus','🔄 出馬表取得中...','info');var u=$('raceUrl').value.trim(),id=raceIdFrom(u);if(!id)throw new Error('race_id入りURLを指定してください');var html=await getText(u);S.horses=parseHorses(html);if(!S.horses.length)throw new Error('出走馬を取得できませんでした');var title=cleanName((norm((html.match(/<title[\s\S]*?<\/title>/i)||[])[0]||'')).split('|')[0]);$('raceName').textContent=title||id;renderHorses();st('raceStatus','✅ 出走馬 '+S.horses.length+' 頭取得 / race_id '+id,'ok')}catch(e){console.error(e);st('raceStatus','❌ '+e.message,'err')}}function calc(ev){ev&&ev.preventDefault();var hs=S.horses.slice().filter(x=>x.num>=1&&x.num<=18);if(!hs.length){alert('馬データがありません');return}hs.forEach(x=>{var o=parseFloat(x.odds)||Math.max(2,(parseInt(x.pop,10)||8)*1.7);x.p=Math.min(.65,Math.max(.01,.8/o));x.score=x.p*100});hs.sort((a,b)=>b.score-a.score);var c=[];hs.slice(0,8).forEach(h=>c.push({type:'単勝',nums:String(h.num),p:h.p,odds:1/h.p*.78,ev:.78}));for(var i=0;i<Math.min(5,hs.length);i++)for(var j=i+1;j<Math.min(6,hs.length);j++){var p=hs[i].p*hs[j].p*2.4;c.push({type:'ワイド',nums:hs[i].num+'-'+hs[j].num,p:p,odds:1/Math.max(p,.01)*.82,ev:p*(1/Math.max(p,.01)*.82)})}c.sort((a,b)=>b.ev-a.ev);S.cands=c;var max=parseInt($('maxTickets').value,10)||8;var top=c.slice(0,max);$('tickets').innerHTML=top.map(x=>'<div class="status ok"><b>'+x.type+' '+x.nums+'</b>　EV '+x.ev.toFixed(2)+'　想定 '+x.odds.toFixed(1)+'倍</div>').join('');$('cand').innerHTML=c.map(x=>'<tr><td>'+x.type+'</td><td>'+x.nums+'</td><td>'+(x.p*100).toFixed(1)+'%</td><td>'+x.odds.toFixed(1)+'</td><td>'+x.ev.toFixed(2)+'</td></tr>').join('');document.querySelector('[data-tab="rec"]').click()}function addHorse(){S.horses.push({num:S.horses.length+1,name:'',odds:'',pop:''});renderHorses()}function sim(){var b=parseInt($('bet').value,10)||0,r=parseInt($('ret').value,10)||0;S.profit+=r-b;$('simOut').className='status '+(S.profit>=0?'ok':'err');$('simOut').textContent='今回 '+(r-b).toLocaleString()+'円 / 累計 '+S.profit.toLocaleString()+'円'}async function testProxy(ev){if(ev){ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation&&ev.stopImmediatePropagation()}var btn=$('testProxyBtn');try{btn.disabled=true;btn.textContent='🔄 接続確認中...';st('proxyStatus','接続確認中...','info');var r=await fetch(proxy()+'?url='+encodeURIComponent('https://race.netkeiba.com/'),{cache:'no-store',mode:'cors',credentials:'omit'});if(!r.ok)throw new Error('HTTP '+r.status);var t=await r.text();if(!t||t.length<20)throw new Error('空レスポンス');st('proxyStatus','✅ 接続成功：Workers経由でnetkeibaへ到達しました。','ok')}catch(e){console.error(e);st('proxyStatus','❌ 接続失敗：'+e.message,'err')}finally{btn.disabled=false;btn.textContent='🔗 接続テスト'}return false}function bindButton(id,fn){var b=$(id);if(!b)return;b.setAttribute('type','button');b.style.pointerEvents='auto';b.onclick=fn;b.addEventListener('click',fn,true);b.addEventListener('touchend',fn,{capture:true,passive:false});b.addEventListener('pointerup',fn,true)}function init(){var d=new Date();$('pickDate').value=d.toISOString().slice(0,10);$('kind').onchange=function(){$('kindBadge').textContent=this.value};$('venue').onchange=renderRaceSelect;$('raceSel').onchange=applyRace;bindTabs();bindButton('listBtn',loadList);bindButton('fetchBtn',fetchRace);bindButton('calcBtn',calc);bindButton('addHorse',addHorse);bindButton('simBtn',sim);bindButton('testProxyBtn',testProxy);if(localStorage.keiba_proxy_url)$('proxyUrl').value=localStorage.keiba_proxy_url}document.addEventListener('DOMContentLoaded',init);window.addEventListener('load',init);setTimeout(init,500);window.testProxy=testProxy})();
</script></body></html>
